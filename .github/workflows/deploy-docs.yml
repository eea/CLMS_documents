name: Build and Deploy Documentation

on:
  push:
    branches:
      - develop
      - test
      - main
  workflow_dispatch:  # manual trigger from Actions UI

# Two runs on the same branch would race on the cache + doc-map commit-back
# and on the gh-pages deploy. Queue rather than cancel — killing a run
# mid-write can leave the cache half-updated.
concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy_docs:
    name: Build and Deploy Docs
    runs-on: ubuntu-latest

    container:
      # Pinned (May 2026).
        image: mckeea/quarto-doc-builder:1.0.2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Mark repo as safe for Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Show commit history
        run: git log --oneline -n 5

      - name: Get changed .qmd files on current branch
        run: |
          (git diff --name-only HEAD^ HEAD | grep -E '\.qmd$' || true) > modified_docs_list.txt
          echo "Modified .qmd files:"
          cat modified_docs_list.txt

      - name: Set up git user for commits
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Detect test mode for dry-run
        id: test_mode
        run: |
          if [[ "${{ github.ref }}" == refs/heads/test-* ]]; then
            echo "dry_run=true" >> $GITHUB_OUTPUT
            echo "🔍 Test branch detected - enabling DRY_RUN mode"
          else
            echo "dry_run=false" >> $GITHUB_OUTPUT
            echo "✅ Production branch - normal execution"
          fi

      # Runs directly in the job container (quarto-doc-builder now carries
      # google-genai + tiktoken). safe.directory was already set above.
      - name: Update intros, keywords, versions & changelogs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DRY_RUN: ${{ steps.test_mode.outputs.dry_run }}
        run: |
          DRY_RUN_FLAG=""
          if [[ "$DRY_RUN" == "true" ]]; then DRY_RUN_FLAG="--dry-run"; fi
          # --versions only on main (real release work) and test-* (dry-run pipeline tests).
          # develop and test skip it: develop never bumps versions, and test has no
          # release tags to compare against since we made releases main-only.
          if [[ "${{ github.ref_name }}" == "main" || "${{ github.ref }}" == refs/heads/test-* ]]; then
            python .github/scripts/ai/update_documentation.py --intros modified_docs_list.txt --versions $DRY_RUN_FLAG
          else
            python .github/scripts/ai/update_documentation.py --intros modified_docs_list.txt $DRY_RUN_FLAG
          fi

      - name: Describe images (develop only — cache propagates to test/main)
        if: github.ref_name == 'develop'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Generates Gemini vision descriptions for all images under
          # DOCS/*/*-media/. The script is content-addressable (cache key =
          # md5 of image bytes), so existing entries are skipped — only new
          # or changed images hit the API. Cache lands in .llm_cache/images/
          # and is committed back in the next step alongside the intros cache.
          python .github/scripts/ai/describe_images.py

      - name: Commit updated LLM cache and version history
        if: steps.test_mode.outputs.dry_run == 'false'
        run: |
          git add .llm_cache .version-history

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update LLM cache and version history [skip ci]"
            git push origin HEAD
          fi

      - name: Build Docs
        run: .github/scripts/build/build-docs.sh

      - name: Commit updated non-browsable doc map
        run: |
          git add .github/non_browsable_doc_map.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update non-browsable doc map [skip ci]"
            git push origin HEAD
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: DOCS/_site
          target-folder: ${{ github.ref_name }}
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
