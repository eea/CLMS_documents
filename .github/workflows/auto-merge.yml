name: Auto Merge Approved PRs

on:
  pull_request_review:
    types: [submitted]

jobs:
  auto-merge:
    if: github.event.review.state == 'approved' &&
      (github.event.pull_request.base.ref == 'test' || github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for all required status checks to pass
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          echo "Waiting for required status checks on PR #$PR_NUMBER (SHA: $HEAD_SHA)..."

          # Anchor against the empty-checks race: if a reviewer approves before
          # any check has registered, PENDING=0 && FAILED=0 is vacuously true
          # and we'd merge with no validation. validate_merge_origin (job in
          # validate-pull-request.yml) always fires for these PRs, so require
          # it to be green before continuing.
          ANCHOR_CHECK="validate_merge_origin"

          MAX_WAIT=1800  # 30 min â€” covers deploy-docs (Quarto + DOCXâ†’PDF) finishing mid-review
          INTERVAL=15
          ELAPSED=0

          while true; do
            # Fetch all check runs for this commit
            CHECKS=$(gh api \
              "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" \
              --jq '[.check_runs[] | {name: .name, status: .status, conclusion: .conclusion}]')

            TOTAL=$(echo   "$CHECKS" | jq 'length')
            PENDING=$(echo "$CHECKS" | jq '[.[] | select(.status != "completed")] | length')
            FAILED=$(echo  "$CHECKS" | jq '[.[] | select(.status == "completed" and (.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral"))] | length')
            ANCHOR_OK=$(echo "$CHECKS" | jq --arg n "$ANCHOR_CHECK" '[.[] | select(.name == $n and .status == "completed" and .conclusion == "success")] | length')

            echo "  checks total=$TOTAL pending=$PENDING failed=$FAILED anchor_ok=$ANCHOR_OK  (elapsed=${ELAPSED}s)"

            if [[ "$FAILED" -gt 0 ]]; then
              echo "âťŚ One or more required checks failed â€” aborting merge."
              echo "$CHECKS" | jq '.[] | select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")'
              exit 1
            fi

            if [[ "$ANCHOR_OK" -ge 1 && "$PENDING" -eq 0 ]]; then
              echo "âś… Anchor check '$ANCHOR_CHECK' passed and all checks completed."
              break
            fi

            if [[ "$ANCHOR_OK" -eq 0 ]]; then
              echo "  âŹł Anchor check '$ANCHOR_CHECK' not yet present/successful â€” waiting."
            fi

            if [[ "$ELAPSED" -ge "$MAX_WAIT" ]]; then
              echo "âŹ° Timed out waiting for checks after ${MAX_WAIT}s â€” aborting merge."
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR title and description
        id: pr_info
        run: |
          title=$(gh pr view ${{ github.event.pull_request.number }} --json title -q .title)
          # For testâ†’main, the PR description carries the BREAKING CHANGE
          # marker (when release_type=major) set by open-release-pr.yml.
          pr_body=$(gh pr view ${{ github.event.pull_request.number }} --json body -q .body)
          echo "title=$title" >> $GITHUB_OUTPUT
          {
            echo 'pr_body<<PR_BODY_EOF'
            echo "$pr_body"
            echo 'PR_BODY_EOF'
          } >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate commit message body
        id: commit_body
        run: |
          file_list=$(.github/scripts/generate_commit_message.sh ${{ github.event.pull_request.number }})
          {
            echo 'body<<EOF'
            echo "$file_list"
            echo 'EOF'
          } >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge the PR
        run: |
          # developâ†’test: squash (PR title becomes subject; body is the file list).
          # testâ†’main:   merge commit, with --subject so it isn't "Merge pull
          #              request #N". Body = PR description (carries BREAKING
          #              CHANGE for major) + file list. semantic-release reads
          #              subject + body to pick the bump.
          if [[ "${{ github.event.pull_request.base.ref }}" == "main" ]]; then
            cat > /tmp/commit_msg.txt << 'EOF'
          ${{ steps.pr_info.outputs.pr_body }}

          ## Changed documents
          ${{ steps.commit_body.outputs.body }}
          EOF
            gh pr merge ${{ github.event.pull_request.number }} \
              --merge \
              --subject "${{ steps.pr_info.outputs.title }}" \
              --body "$(cat /tmp/commit_msg.txt)"
          else
            gh pr merge ${{ github.event.pull_request.number }} \
              --squash \
              --body "${{ steps.commit_body.outputs.body }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
