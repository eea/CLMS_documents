documentclass: scrartcl
toc: true # Enable the Table of Contents
toc-title: "Index"
toc-depth: 3 # Include headings up to level 3 (###)
number-sections: true
sitemap: true # Enables sitemap generation for web crawlers
tbl-colwidths: auto
license: "EUPL (>= 1.2)"
keywords: "{keywords_str}"
format:
  html:
    include-in-header:
      - ../_meta/includes/json-ld.html
    include-before-body: ../_meta/includes/default-before-body.html
    css: _meta/theme/styles.css
    code-fold: true # Allow code blocks to be foldable
    self-contained: false # Don't embed resources like CSS and images
    filters:
      - ../../.github/scripts/filters/extract-images.lua
      - ../../.github/scripts/filters/inject-image-descriptions.lua
      - ../../.github/scripts/filters/inject_contact_info.lua
      - ../../.github/scripts/build/inject_changelog.py

  # PDF output: rendered by Typst via a custom OFL-licensed template.
  typst:
    template-partials:
      - _meta/theme/typst/typst-template.typ
      - _meta/theme/typst/typst-show.typ
    toc-title: "Table of contents"
    section-numbering: 1.1.1
    papersize: a4
    margin:
      x: 2.54cm
      top: 2.54cm
      bottom: 3.35cm
    fontsize: 10pt
    # Note: contact info is NOT injected here for Typst — the typst-template.typ
    # renders it as front matter (after the TOC) so page numbering stays clean.
    filters:
      - ../../.github/scripts/filters/inject-image-descriptions.lua
      - ../../.github/scripts/build/inject_changelog.py

  gfm:
    filters:
      - ../../.github/scripts/filters/inject-image-descriptions.lua

format-links:
  - html
  - format: typst
    text: PDF
    icon: file-pdf
