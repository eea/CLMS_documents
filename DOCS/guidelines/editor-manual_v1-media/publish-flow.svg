<svg width="680" height="95" viewBox="0 0 680 95" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>The publish flow</title>
  <defs>
    <style>
      .pf-label { font-family: sans-serif; font-size: 12px; fill: #5F5E5A; }
      .pf-text  { font-family: sans-serif; font-size: 14px; font-weight: 500; }
    </style>
    <marker id="pf-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text class="pf-label" x="214" y="26" text-anchor="middle">git docs-publish</text>
  <text class="pf-label" x="382" y="26" text-anchor="middle">Owner PR</text>
  <text class="pf-label" x="510" y="26" text-anchor="middle">Owner PR</text>
  <rect x="15"  y="34" width="148" height="38" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="pf-text" x="89"  y="58" text-anchor="middle" fill="#085041">Your project repo</text>
  <line x1="165" y1="53" x2="263" y2="53" stroke="#888780" stroke-width="1.5" marker-end="url(#pf-arrow)"/>
  <rect x="265" y="34" width="86"  height="38" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="pf-text" x="308" y="58" text-anchor="middle" fill="#0C447C">develop</text>
  <line x1="353" y1="53" x2="411" y2="53" stroke="#888780" stroke-width="1.5" marker-end="url(#pf-arrow)"/>
  <rect x="413" y="34" width="66"  height="38" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="pf-text" x="446" y="58" text-anchor="middle" fill="#0C447C">test</text>
  <line x1="481" y1="53" x2="539" y2="53" stroke="#888780" stroke-width="1.5" marker-end="url(#pf-arrow)"/>
  <rect x="541" y="34" width="125" height="38" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="pf-text" x="603" y="58" text-anchor="middle" fill="#3C3489">main / public</text>
</svg>
