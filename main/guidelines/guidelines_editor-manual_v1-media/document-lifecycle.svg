<svg width="680" height="255" viewBox="0 0 680 255" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Document lifecycle</title>
  <desc>Three-row snake diagram. Row 1 left to right: Copy template, Rename, Edit. Row 2 right to left: Preview, Publish, On develop. Row 3: Library release.</desc>
  <defs>
    <style>
      .label { font-family: sans-serif; font-size: 12px; fill: #5F5E5A; }
      .box-text { font-family: sans-serif; font-size: 14px; font-weight: 500; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ROW 1: left to right -->
  <rect x="50" y="30" width="150" height="38" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="box-text" x="125" y="54" text-anchor="middle" fill="#085041">Copy template</text>

  <line x1="202" y1="49" x2="238" y2="49" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="240" y="30" width="150" height="38" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="box-text" x="315" y="54" text-anchor="middle" fill="#0C447C">Rename</text>

  <line x1="392" y1="49" x2="428" y2="49" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="430" y="30" width="150" height="38" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="box-text" x="505" y="54" text-anchor="middle" fill="#0C447C">Edit</text>

  <!-- Vertical connector RIGHT -->
  <line x1="505" y1="70" x2="505" y2="110" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ROW 2: right to left -->
  <rect x="430" y="112" width="150" height="38" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="box-text" x="505" y="136" text-anchor="middle" fill="#0C447C">Preview</text>

  <line x1="428" y1="131" x2="392" y2="131" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="240" y="112" width="150" height="38" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="box-text" x="315" y="136" text-anchor="middle" fill="#0C447C">Publish</text>

  <line x1="238" y1="131" x2="202" y2="131" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="50" y="112" width="150" height="38" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="box-text" x="125" y="136" text-anchor="middle" fill="#0C447C">On develop</text>

  <!-- Vertical connector LEFT -->
  <line x1="125" y1="152" x2="125" y2="198" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="label" x="134" y="176" text-anchor="start">owner-controlled</text>

  <!-- ROW 3 -->
  <rect x="50" y="200" width="150" height="38" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="box-text" x="125" y="224" text-anchor="middle" fill="#3C3489">Library release</text>

</svg>
